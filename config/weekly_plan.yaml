monday:
  topic: "Inspiración floral del lunes"
  source: "nanobanana"
  ai_prompt: "Ultra-detailed macro photograph of a single stunning flower in full bloom, soft natural light, luminous airy mood, blush and cream pastel background, dreamy bokeh, vertical 9:16 composition, negative space at top for text overlay, editorial quality"
  caption_hooks:
    - "Pregunta inspiracional"
    - "Frase corta positiva"
    - "Tip rapido de bienestar"
  caption_tones:
    - "motivational"
    - "warm"
    - "elegant"
  cta_variations:
    - "Feliz semana! Una nueva semana llena de flores te espera"
    - "Comienza la semana con energia bonita"
    - "Cual es tu flor favorita para arrancar el lunes?"
  image_moods:
    - "airy editorial"
    - "dreamy macro"
    - "soft natural"
  image_compositions:
    - "close-up with negative space"
    - "off-center hero flower"
    - "gentle side angle"
  prompt_style: "motivational"
  cta: "Feliz semana! Una nueva semana llena de flores te espera"

