monday:
  topic: "Inspiración floral del lunes"
  source: "nanobanana"
  use_input_image: true
  ai_prompt: "Use the provided reference image as the base composition and transform it into an ultra-detailed macro floral editorial photo. Preserve the main subject structure while enhancing details, soft natural light, vertical 9:16, with negative space at top for text overlay."
  caption_hooks:
    - "Pregunta inspiracional"
    - "Frase corta positiva"
    - "Tip rapido de bienestar"
  caption_tones:
    - "motivational"
    - "warm"
    - "elegant"
  cta_variations:
    - "Feliz semana! Una nueva semana llena de flores te espera"
    - "Comienza la semana con energia floral"
    - "Cual es tu flor favorita para arrancar el lunes?"
  image_moods:
    - "airy editorial"
    - "soft natural"
  image_compositions:
    - "close-up with negative space"
    - "off-center hero flower"
    - "gentle side angle"
  prompt_style: "motivational"
  cta: "Feliz semana! Una nueva semana llena de flores te espera"

